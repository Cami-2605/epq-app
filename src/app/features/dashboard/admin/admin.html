<div class="page-shell admin-page">
  <header class="top-bar">
    <div class="brand">
      <img src="https://res.cloudinary.com/dmjww2gh5/image/upload/v1765378795/logo_epq_jrplxy.png" alt="Logo EPQ" class="logo" />
      <span class="name">Empresas Publicas del Quindío EPQ</span>
    </div>

     <div class="user-actions">
      <button class="pill-btn" (click)="logout()">Log out</button>
      <div class="avatar"></div>
    </div>
  </header>

  <nav class="tabs">
    <button (click)="goToExcel()">Excel reportes</button>
    <span class="sep"></span>
    <button (click)="goToUsuarios()">Usuarios</button>
  </nav>

  <main class="admin-content">
    <h1>Reportes</h1>
    <div class="section-divider"></div>

     <section class="form-grid">
      <div class="field">
        <label>Seleccione el municipio:</label>
        <select [(ngModel)]="municipio">
          <option value="" disabled selected>Seleccione</option>
          <option *ngFor="let m of municipios" [value]="m">{{ m }}</option>
        </select>
      </div>
      
      <div class="field">
        <label>Seleccione el periodo:</label>
        <select [(ngModel)]="periodo">
           <option value="" disabled selected>Seleccione</option>
          <option *ngFor="let p of periodos" [value]="p">{{ p }}</option>
        </select>
      </div>

       <div class="field">
        <label>Desde:</label>
        <input type="date" [(ngModel)]="fechaInicio" />
      </div>

      <div class="field">
        <label>Hasta:</label>
        <input type="date" [(ngModel)]="fechaFin" />
      </div>

      <div class="field">
        <label>Tipo de reporte:</label>
        <select [(ngModel)]="tipoReporte">
          <option value="" disabled selected>Seleccione</option>
          <option *ngFor="let tipo of tiposReporte" [value]="tipo">{{ tipo }}</option>
        </select>
      </div>

      <div class="field">
        <label>Tipo de archivo:</label>
        <select [(ngModel)]="tipoArchivo">
           <option value="" disabled selected>Seleccione</option>
          <option *ngFor="let ext of tiposArchivo" [value]="ext">{{ ext }}</option>
        </select>
      </div>
    </section>

    <section class="file-picker">
      <label>Archivos Excel:</label>
      <div class="chips">
        <button
          type="button"
          *ngFor="let file of archivos"
          (click)="toggleArchivo(file.nombreArchivo)"
          [class.selected]="archivosSeleccionados.includes(file.nombreArchivo)"
        >
          {{ file.nombreArchivo }}
        </button>
      </div>
    </section>

    <button class="generate-btn" (click)="generarReporte()">Generar reporte</button>
  </main>
</div>
