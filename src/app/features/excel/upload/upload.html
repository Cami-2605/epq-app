<div class="page-shell excel-page">
  <header class="top-bar">
    <div class="brand">
      <img src="https://res.cloudinary.com/dmjww2gh5/image/upload/v1765378795/logo_epq_jrplxy.png" class="logo" alt="Logo EPQ" />
      <span class="name">Empresas Publicas del Quindío EPQ</span>
    </div>

    <div class="user-section">
      <button class="pill-btn" (click)="logout()">Log out</button>
      <div class="avatar"></div>
    </div>
  </header>

   <nav class="tabs">
    <button class="active" (click)="goToExcel()">Excel reportes</button>
    <span class="sep"></span>
    <button (click)="goToUsuarios()">Usuarios</button>
  </nav>

  <main class="excel-content">
    <h1>Excel reportes</h1>
    <div class="section-divider"></div>

   <section class="upload-row">
      <input type="file" (change)="onFileSelected($event)" />
      <button (click)="uploadFile()">Subir archivo</button>
    </section>

    <section class="table-box">
      <div class="table-header">
        <span>Acción</span>
        <span>Nombre documento</span>
        <span>Id</span>
        <span>Peso</span>
      </div>

      <div class="table-row" *ngFor="let file of files">
        <div class="actions">
          <button class="view" (click)="viewFile(file)">👁</button>
          <button class="delete" (click)="deleteFile(file)">✖</button>
          <button class="edit" (click)="downloadFile(file)">✎</button>
        </div>

       <span>{{ file.nombreArchivo || file.name || 'Documento' }}</span>
        <span>{{ file.id || 'N/A' }}</span>
        <span>{{ file.peso || file.size || 'N/A' }}</span>
      </div>
    </section>
  </main>
</div>
