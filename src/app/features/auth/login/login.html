<div class="page-shell auth-page">
  <header class="top-bar">
    <div class="brand">
      <img src="https://res.cloudinary.com/dmjww2gh5/image/upload/v1765378795/logo_epq_jrplxy.png" alt="Logo EPQ" class="logo" />
      <span class="name">Empresas Públicas del Quindío EPQ</span>
    </div>
  </header>

  <section class="auth-content">
    <h1 class="auth-title">Inicio de sesión</h1>
    <div class="section-divider"></div>

    <div class="auth-grid">
      <div class="auth-form">
        <label for="user">Usuario:</label>
        <input id="user" type="text" [(ngModel)]="username" placeholder="Ingresar usuario" />

        <label for="pass">Contraseña:</label>
        <div class="password-wrap">
          <input
            id="pass"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Ingresar contraseña"
          />
          <button type="button" class="eye" (click)="togglePassword()">👁</button>
        </div>

        <button class="signin" (click)="login()">Iniciar sesión</button>

        <p class="register">
          ¿No tienes una cuenta?
          <a routerLink="/register">Regístrate aquí</a>
        </p>
      </div>

       <div class="profile-card">
        <img src="https://res.cloudinary.com/dmjww2gh5/image/upload/v1765379696/descarga_1_jgxs8e.jpg" alt="Perfil" />
      </div>
    </div>

     </section>
</div>
