<div class="page-shell register-page">
  <header class="top-bar">
    <div class="brand">
      <img src="https://res.cloudinary.com/dmjww2gh5/image/upload/v1765378795/logo_epq_jrplxy.png" class="logo" alt="Logo EPQ" />
      <span class="name">Empresas Públicas del Quindío EPQ</span>
    </div>
  </header>

  <section class="register-content">
    <h1 class="register-title">Registro</h1>
    <div class="section-divider"></div>

     <div class="register-grid">
      <div class="fields-grid">
        <div class="field">
          <label>Nombre completo:</label>
          <input type="text" [(ngModel)]="nombre" />
        </div>

         <div class="field">
          <label>Telefono:</label>
          <input type="text" [(ngModel)]="telefono" />
        </div>

        <div class="field">
          <label>Correo:</label>
          <input type="email" [(ngModel)]="correo" />
        </div>

         <div class="field">
          <label>Usuario:</label>
          <input type="text" [(ngModel)]="username" />
        </div>

        <div class="field full">
          <label>Contraseña:</label>
          <input type="password" [(ngModel)]="password" />
        </div>

        <button class="register-btn" (click)="register()">Registrarse</button>
      </div>

      <div class="photo-panel">
        <div class="photo-card">
          <img [src]="imagePreview || defaultImage" alt="Foto de perfil" />
        </div>

        <label class="upload-photo">
          Subir foto
          <input type="file" accept="image/*" (change)="onFileSelected($event)" />
        </label>
      </div>
    </div>

      </section>
</div>
