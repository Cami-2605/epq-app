<div class="login-wrapper">

  <!-- HEADER -->
  <div class="top-bar">
    <img 
      src="https://res.cloudinary.com/dmjww2gh5/image/upload/v1765378795/logo_epq_jrplxy.png"
      class="logo">

    <span>Empresas Públicas del Quindío EPQ</span>
  </div>

  <!-- MAIN -->
  <div class="login-container">

    <!-- FORM -->
    <div class="form-box">

      <h2>Registro</h2>
      <div class="divider"></div>

      <div class="grid-form">

        <div>
          <label>Nombre completo</label>
          <input 
            type="text"
            [(ngModel)]="nombre"
            placeholder="Ingresa tu nombre">
        </div>

        <div>
          <label>Teléfono</label>
          <input 
            type="text"
            [(ngModel)]="telefono"
            placeholder="Ingresa tu teléfono">
        </div>

        <div>
          <label>Correo</label>
          <input 
            type="email"
            [(ngModel)]="correo"
            placeholder="Ingresa tu correo">
        </div>

        <div>
          <label>Usuario</label>
          <input 
            type="text"
            [(ngModel)]="username"
            placeholder="Crea tu usuario">
        </div>

        <div class="full-width">
          <label>Contraseña</label>
          <input 
            type="password"
            [(ngModel)]="password"
            placeholder="Crea tu contraseña">
        </div>

      </div>

      <button class="login-btn" (click)="register()">
        Registrarse
      </button>

    </div>

    <!-- IMAGE SIDE -->
    <div class="image-box">

  <div class="image-card">
    <img
      [src]="imagePreview || defaultImage"
      alt="Foto de perfil">
  </div>

  <label class="upload-btn">
    Subir foto
    <input
      type="file"
      accept="image/*"
      (change)="onFileSelected($event)">
  </label>

</div>
  </div>

</div>
